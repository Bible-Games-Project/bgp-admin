name: "[Reusable] Notify Telegram"

on:
  workflow_call:
    inputs:
      app-name:
        description: "Display name of the app for the notification"
        required: true
        type: string
      platforms:
        description: "Platforms deployed (e.g., 'iOS + Android')"
        required: false
        type: string
        default: "iOS + Android"
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true

jobs:
  notify:
    name: Send Telegram Notification 🎉
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version with build number
        id: get_version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          PARTS=(${BASE_VERSION//./ })
          VERSION="${PARTS[0]}.${PARTS[1]}.${{ github.run_number }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VERSION: ${{ steps.get_version.outputs.version }}
          APP_NAME: ${{ inputs.app-name }}
          PLATFORMS: ${{ inputs.platforms }}
          REPO_NAME: ${{ github.repository }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
          PR_TITLE: ${{ github.event.pull_request.title || github.event.head_commit.message }}
          PR_URL: ${{ github.event.pull_request.html_url || format('{0}/{1}/commit/{2}', github.server_url, github.repository, github.sha) }}
          ACTOR: ${{ github.actor }}
        run: |
          MESSAGE="🚀 <b>Beta published successfully</b>%0A%0A"
          MESSAGE+="📱 <b>App:</b> ${APP_NAME}%0A"
          MESSAGE+="📦 <b>Version:</b> ${VERSION}%0A"
          MESSAGE+="🖥️ <b>Platforms:</b> ${PLATFORMS}%0A"
          MESSAGE+="🌿 <b>Repo:</b> <a href='${REPO_URL}'>${REPO_NAME}</a>%0A"
          MESSAGE+="🔹 <b>Change:</b> <a href='${PR_URL}'>${PR_TITLE}</a>%0A"
          MESSAGE+="🧑🏻‍💻 <b>Published by:</b> ${ACTOR}"

          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d text="${MESSAGE}"
