name: Generate App Assets

on:
  workflow_dispatch:
    inputs:
      asset_type:
        description: "Type of asset being updated (icon or splash)"
        required: false
        type: string
        default: "icon"

jobs:
  generate:
    name: Generate Assets with @capacitor/assets
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install @capacitor/assets
        run: |
          bun add -g @capacitor/assets
      
      - name: Check if config file exists
        id: check_config
        run: |
          if [ -f "assets/config.json" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Read asset configuration
        if: steps.check_config.outputs.exists == 'true'
        id: config
        run: |
          CONFIG=$(cat assets/config.json)
          echo "config=$CONFIG" >> $GITHUB_OUTPUT
      
      - name: Generate assets
        run: |
          cd ${{ github.workspace }}
          
          # Parse configuration if available
          if [ -f "assets/config.json" ]; then
            ICON_BG=$(cat assets/config.json | grep -o '"iconBackgroundColor"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4 || echo "#ffffff")
            SPLASH_BG=$(cat assets/config.json | grep -o '"splashBackgroundColor"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4 || echo "#ffffff")
            SPLASH_BG_DARK=$(cat assets/config.json | grep -o '"splashBackgroundColorDark"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4 || echo "#000000")
          else
            ICON_BG="#ffffff"
            SPLASH_BG="#ffffff"
            SPLASH_BG_DARK="#000000"
          fi
          
          echo "Generating assets with:"
          echo "  Icon BG: $ICON_BG"
          echo "  Splash BG: $SPLASH_BG"
          echo "  Splash BG Dark: $SPLASH_BG_DARK"
          
          # Run capacitor assets
          npx @capacitor/assets generate \
            --iconBackgroundColor "$ICON_BG" \
            --splashBackgroundColor "$SPLASH_BG" \
            --splashBackgroundColorDark "$SPLASH_BG_DARK"
      
      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "has_changes=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "BGP Admin Bot"
          git config user.email "admin@biblegames.dev"
          
          git add .
          
          COMMIT_MSG="chore: generate ${{ inputs.asset_type }} assets via @capacitor/assets

Generated by GitHub Actions workflow
Triggered from bgp-admin panel"
          
          git commit -m "$COMMIT_MSG"
          git push
      
      - name: Summary
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "✅ Assets generated and committed successfully"
          else
            echo "ℹ️ No changes detected - assets were already up to date"
          fi
