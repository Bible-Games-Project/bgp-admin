name: Generate App Assets (Centralized)

on:
  workflow_dispatch:
    inputs:
      github_owner:
        description: "GitHub repository owner"
        required: true
        type: string
      github_repo:
        description: "GitHub repository name"
        required: true
        type: string
      branch:
        description: "Branch to work on"
        required: true
        type: string
      asset_type:
        description: "Type of asset being updated (icon or splash)"
        required: false
        type: string
        default: "icon"
      pat:
        description: "GitHub PAT with write access to the target repository"
        required: true
        type: string

jobs:
  generate:
    name: Generate Assets with @capacitor/assets
    runs-on: ubuntu-latest
    # Only run when manually triggered via workflow_dispatch with proper inputs
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.github_owner != '' && inputs.github_repo != '' && inputs.branch != '' }}
    
    steps:
      - name: Clone target app repository
        run: |
          git clone --depth 1 --branch ${{ inputs.branch }} \
            https://x-access-token:${{ inputs.pat }}@github.com/${{ inputs.github_owner }}/${{ inputs.github_repo }}.git \
            app-repo
          cd app-repo
          git config user.name "BGP Admin Bot"
          git config user.email "admin@biblegames.dev"
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      
      - name: Install @capacitor/assets
        run: |
          bun add -g @capacitor/assets
      
      - name: Check if assets exist
        id: check_assets
        run: |
          cd app-repo
          if [ ! -d "mobile-assets" ]; then
            echo "Error: mobile-assets/ directory not found in repository"
            exit 1
          fi
          
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            echo "Error: No capacitor config found"
            exit 1
          fi
          
          echo "✓ mobile-assets directory and Capacitor config found"
      
      - name: Parse asset configuration
        id: config
        run: |
          cd app-repo
          
          if [ -f "mobile-assets/config.json" ]; then
            ICON_BG=$(cat mobile-assets/config.json | grep -o '"iconBackgroundColor"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4 || echo "#ffffff")
            SPLASH_BG=$(cat mobile-assets/config.json | grep -o '"splashBackgroundColor"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4 || echo "#ffffff")
            SPLASH_BG_DARK=$(cat mobile-assets/config.json | grep -o '"splashBackgroundColorDark"[[:space:]]*:[[:space:]]*"[^"]*"' | cut -d'"' -f4 || echo "#000000")
          else
            ICON_BG="#ffffff"
            SPLASH_BG="#ffffff"
            SPLASH_BG_DARK="#000000"
          fi
          
          echo "icon_bg=$ICON_BG" >> $GITHUB_OUTPUT
          echo "splash_bg=$SPLASH_BG" >> $GITHUB_OUTPUT
          echo "splash_bg_dark=$SPLASH_BG_DARK" >> $GITHUB_OUTPUT
      
      - name: Generate assets
        run: |
          cd app-repo
          
          echo "Generating assets with:"
          echo "  Icon BG: ${{ steps.config.outputs.icon_bg }}"
          echo "  Splash BG: ${{ steps.config.outputs.splash_bg }}"
          echo "  Splash BG Dark: ${{ steps.config.outputs.splash_bg_dark }}"
          
          npx @capacitor/assets generate \
            --assetPath mobile-assets \
            --iconBackgroundColor "${{ steps.config.outputs.icon_bg }}" \
            --splashBackgroundColor "${{ steps.config.outputs.splash_bg }}" \
            --splashBackgroundColorDark "${{ steps.config.outputs.splash_bg_dark }}"

      
      - name: Commit and push changes
        run: |
          cd app-repo
          
          git add .
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "ℹ️ No changes detected - assets were already up to date"
            exit 0
          fi
          
          cat > /tmp/commit-msg << 'EOF'
          chore: generate ${{ inputs.asset_type }} assets via @capacitor/assets

          Generated by BGP Admin centralized workflow
          Repository: ${{ inputs.github_owner }}/${{ inputs.github_repo }}
          Branch: ${{ inputs.branch }}
          EOF
          
          git commit -F /tmp/commit-msg
          
          git push https://x-access-token:${{ inputs.pat }}@github.com/${{ inputs.github_owner }}/${{ inputs.github_repo }}.git ${{ inputs.branch }}
          
          echo "✅ Assets generated and pushed successfully"
