name: Set iOS Secrets

on:
  workflow_dispatch:
    inputs:
      github_owner:
        description: "Target repo owner"
        required: true
      github_repo:
        description: "Target repo name"
        required: true
      pat:
        description: "GitHub PAT with repo scope for target repo"
        required: true
      provision_base64:
        description: "Base64-encoded .mobileprovision file"
        required: true
      export_options_base64:
        description: "Base64-encoded ExportOptions.plist"
        required: true

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Set iOS repository secrets
        env:
          GH_TOKEN: ${{ github.event.inputs.pat }}
          GITHUB_OWNER: ${{ github.event.inputs.github_owner }}
          GITHUB_REPO: ${{ github.event.inputs.github_repo }}
          PROVISION_B64: ${{ github.event.inputs.provision_base64 }}
          EXPORT_OPTIONS_B64: ${{ github.event.inputs.export_options_base64 }}
        run: |
          printf '%s' "$PROVISION_B64"     | gh secret set IOS_BUILD_PROVISION_PROFILE_BASE64 -R "$GITHUB_OWNER/$GITHUB_REPO"
          printf '%s' "$EXPORT_OPTIONS_B64" | gh secret set IOS_EXPORT_OPTIONS_PLIST           -R "$GITHUB_OWNER/$GITHUB_REPO"
          echo "iOS secrets set in $GITHUB_OWNER/$GITHUB_REPO"
