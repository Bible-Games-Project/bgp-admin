name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      github_owner:
        description: "Target repo owner"
        required: true
      github_repo:
        description: "Target repo name"
        required: true
      app_name:
        description: "App display name"
        required: true
      pat:
        description: "GitHub PAT with repo scope for target repo"
        required: true
      password:
        description: "Keystore password"
        required: true
      alias:
        description: "Key alias"
        required: true
        default: "release"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore and set repository secrets
        env:
          GH_TOKEN: ${{ github.event.inputs.pat }}
          GITHUB_OWNER: ${{ github.event.inputs.github_owner }}
          GITHUB_REPO: ${{ github.event.inputs.github_repo }}
          APP_NAME: ${{ github.event.inputs.app_name }}
          PASSWORD: ${{ github.event.inputs.password }}
          ALIAS: ${{ github.event.inputs.alias }}
        run: |
          keytool -genkey -noprompt \
            -keystore release.jks \
            -storepass "$PASSWORD" \
            -keypass "$PASSWORD" \
            -alias "$ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=$APP_NAME, OU=BGP, O=Bible-Games-Project, L=Unknown, ST=Unknown, C=US"

          KEYSTORE_B64=$(base64 -w 0 release.jks)

          printf '%s' "$KEYSTORE_B64" | gh secret set ANDROID_KEYSTORE -R "$GITHUB_OWNER/$GITHUB_REPO"
          printf '%s' "$PASSWORD"     | gh secret set KEYSTORE_PASSWORD -R "$GITHUB_OWNER/$GITHUB_REPO"
          printf '%s' "$ALIAS"        | gh secret set KEY_ALIAS         -R "$GITHUB_OWNER/$GITHUB_REPO"

          echo "Keystore generated and secrets set in $GITHUB_OWNER/$GITHUB_REPO"
