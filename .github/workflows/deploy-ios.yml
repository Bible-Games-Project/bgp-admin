name: "[Reusable] Deploy iOS"

on:
  workflow_call:
    inputs:
      xcode-version:
        description: "Xcode version to use (empty = runner default)"
        required: false
        type: string
        default: ""
      runner:
        description: "macOS runner to use"
        required: false
        type: string
        default: "macos-26"
      ios-scheme:
        description: "Xcode scheme name"
        required: false
        type: string
        default: "App"
      ios-project-dir:
        description: "Directory containing .xcodeproj"
        required: false
        type: string
        default: "ios/App"
      ios-project-file:
        description: "Xcode project filename"
        required: false
        type: string
        default: "App.xcodeproj"
      pre-build-script:
        description: "Optional script to run before build (e.g., icon generation)"
        required: false
        type: string
        default: ""
      capacitor-hooks-script:
        description: "Path to capacitor hooks script (empty to skip)"
        required: false
        type: string
        default: ""
      marketing-version:
        description: "Marketing version (e.g., 1.0, 2.1). If empty, uses package.json"
        required: false
        type: string
        default: ""
      bundle-identifier:
        description: "iOS bundle identifier, required when submit-for-review is true"
        required: false
        type: string
        default: ""
      submit-for-review:
        description: "After uploading, attach the build to an App Store version and submit it for Apple review"
        required: false
        type: boolean
        default: false
      release-notes:
        description: "What's New / release notes for the App Store version, required when submit-for-review is true"
        required: false
        type: string
        default: ""
    secrets:
      IOS_TEAM_ID:
        required: true
      IOS_BUILD_CERTIFICATE_BASE64:
        required: true
      IOS_P12_PASSWORD:
        required: true
      IOS_BUILD_PROVISION_PROFILE_BASE64:
        required: true
      IOS_KEYCHAIN_PASSWORD:
        required: true
      IOS_EXPORT_OPTIONS_PLIST:
        required: true
      APP_STORE_CONNECT_API_KEY_ID:
        required: true
      APP_STORE_CONNECT_ISSUER_ID:
        required: true
      APP_STORE_CONNECT_API_KEY_BASE64:
        required: true

jobs:
  deploy-ios:
    name: Build & Deploy iOS
    runs-on: ${{ inputs.runner }}

    env:
      IOS_SCHEME: ${{ inputs.ios-scheme }}
      IOS_PROJECT_DIR: ${{ inputs.ios-project-dir }}
      IOS_PROJECT_FILE: ${{ inputs.ios-project-file }}
      TEAM_ID: ${{ secrets.IOS_TEAM_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Patch package.json version with build number
        run: |
          set -euo pipefail
          FILE="package.json"

          if [ ! -f "$FILE" ]; then
            echo "❌ No existe $FILE"
            exit 1
          fi

          echo "🔍 Versión original:"
          grep '"version"' "$FILE"

          node - <<'EOF'
          const fs = require('fs');
          const path = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));

          const runNumber = process.env.GITHUB_RUN_NUMBER || '0';
          const parts = pkg.version.split('.');
          parts[parts.length - 1] = runNumber;
          pkg.version = parts.join('.');

          fs.writeFileSync(path, JSON.stringify(pkg, null, 2));
          console.log('✅ Nueva versión:', pkg.version);
          EOF

          echo "✅ Resultado final:"
          grep '"version"' "$FILE"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build web assets
        run: NODE_OPTIONS="--max-old-space-size=8192" bun run build

      - name: Run pre-build script
        if: inputs.pre-build-script != ''
        run: ${{ inputs.pre-build-script }}

      - name: Generate index.html for TanStack Start builds
        run: |
          if [ -f "scripts/generate-capacitor-html.js" ]; then
            CAPACITOR_BUILD=1 node scripts/generate-capacitor-html.js
          else
            echo "No postbuild script found — skipping (run Capacitor Setup in bgp-admin if this is a TanStack Start app)"
          fi

      - name: Inject safe area styles (notch / home indicator)
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const file = ['.output/public/index.html', 'dist/client/index.html', 'dist/index.html'].find((f) => fs.existsSync(f));
          if (!file) {
            console.log('No built index.html found — skipping safe area injection');
            process.exit(0);
          }
          let html = fs.readFileSync(file, 'utf8');
          if (html.includes('id="bgp-safe-area"')) {
            console.log('Safe area styles already present — skipping');
            process.exit(0);
          }

          // env(safe-area-inset-*) only reports real values when viewport-fit=cover is set
          const meta = html.match(/<meta[^>]*name=["']viewport["'][^>]*\/?>/i);
          if (meta) {
            let tag = meta[0];
            if (/viewport-fit/i.test(tag)) {
              tag = tag.replace(/viewport-fit=[\w-]*/i, 'viewport-fit=cover');
            } else {
              tag = tag.replace(/content=["']([^"']*)["']/i, (m, v) => `content="${v}, viewport-fit=cover"`);
            }
            html = html.replace(meta[0], tag);
          } else {
            html = html.replace(/<head[^>]*>/i, (m) =>
              `${m}\n  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />`);
          }

          const style = [
            '<style id="bgp-safe-area">',
            '  body {',
            '    padding-top: env(safe-area-inset-top, 0px);',
            '    padding-right: env(safe-area-inset-right, 0px);',
            '    padding-bottom: env(safe-area-inset-bottom, 0px);',
            '    padding-left: env(safe-area-inset-left, 0px);',
            '  }',
            '</style>',
          ].join('\n');
          html = html.replace('</head>', `${style}\n</head>`);

          fs.writeFileSync(file, html);
          console.log(`Injected safe area styles into ${file}`);
          EOF

      - name: Sync Capacitor (iOS)
        run: bunx cap sync ios

      - name: Run Capacitor hooks
        if: inputs.capacitor-hooks-script != ''
        run: node ${{ inputs.capacitor-hooks-script }} capacitor:sync:after ios

      - name: Verify macOS version
        run: sw_vers

      - name: Setup Xcode
        if: inputs.xcode-version != ''
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      - name: Accept Xcode license and prepare components
        run: |
          sudo xcodebuild -license accept || true
          sudo xcodebuild -runFirstLaunch

      - name: Cache iOS platform
        id: cache-ios-platform
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/CoreSimulator/Volumes
          key: ios-platform-${{ inputs.xcode-version }}-${{ inputs.runner }}

      - name: Install iOS platform if needed
        run: |
          set -euo pipefail
          xcodebuild -showsdks
          # Check if generic/platform=iOS destination is available
          if xcodebuild -showdestinations -scheme ${{ inputs.ios-scheme }} \
              -project ${{ inputs.ios-project-dir }}/${{ inputs.ios-project-file }} \
              2>/dev/null | grep -q 'generic/platform:iOS'; then
            echo "✅ iOS platform already available"
          else
            echo "⬇️  iOS platform not registered — downloading (first time for this Xcode version)..."
            sudo xcodebuild -downloadPlatform iOS || true
          fi
          if ! xcodebuild -showsdks 2>/dev/null | grep -q 'iphoneos'; then
            echo "❌ No iOS SDK found. Aborting."
            exit 1
          fi
          echo "✅ iOS SDK is available"

      # === VERSIONADO AUTOMÁTICO ===
      - name: Compute version strings
        run: |
          if [ -n "${{ inputs.marketing-version }}" ]; then
            BASE_VER="${{ inputs.marketing-version }}"
          else
            BASE_VER=$(node -e "console.log(require('./package.json').version)") \
              || { echo 'Could not read package.json version'; exit 1; }
          fi
          # Version format: MAJOR.MINOR.BUILD (e.g. "0.0.51")
          # CFBundleShortVersionString accepts up to 3 segments, so this is valid
          MARKETING_VERSION="${BASE_VER}.${GITHUB_RUN_NUMBER}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "iOS version: $MARKETING_VERSION (build $BUILD_NUMBER)"

      - name: Patch Info.plist (version, build, export compliance)
        working-directory: ${{ inputs.ios-project-dir }}
        run: |
          set -euo pipefail
          PLIST="App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$PLIST" || true
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool NO" "$PLIST"

          # CFBundleShortVersionString: MAJOR.MINOR.BUILD e.g. "0.0.51" (matches Android)
          # CFBundleVersion: build number only e.g. "51"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $MARKETING_VERSION" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$PLIST" || \
            /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "$PLIST"
          echo "Patched $PLIST → CFBundleShortVersionString=$MARKETING_VERSION, CFBundleVersion=$BUILD_NUMBER"

          # Extensions (if any)
          while IFS= read -r p; do
            [ "$p" = "$PLIST" ] && continue
            /usr/libexec/PlistBuddy -c "Delete :ITSAppUsesNonExemptEncryption" "$p" || true
            /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool NO" "$p"
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $MARKETING_VERSION" "$p" || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string $MARKETING_VERSION" "$p"
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$p" || \
              /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NUMBER" "$p"
            echo "Patched $p"
          done < <(find . -name Info.plist -type f)

      # === FIRMA Y ARCHIVO ===
      - name: Import certificates and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

          echo "== Identities =="
          security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(security cms -D -i "$PP_PATH" | plutil -extract UUID raw -)
          PP_NAME=$(security cms -D -i "$PP_PATH" | plutil -extract Name raw -)
          PP_TEAM=$(security cms -D -i "$PP_PATH" | plutil -extract TeamIdentifier.0 raw -)
          echo "Provisioning Profile UUID: $PP_UUID"
          echo "Provisioning Profile Name: $PP_NAME"
          echo "Provisioning Profile Team: $PP_TEAM"
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

          {
            echo "PP_NAME=$PP_NAME"
            echo "PP_UUID=$PP_UUID"
            echo "PP_TEAM=$PP_TEAM"
            echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"
          } >> $GITHUB_ENV

      - name: Patch Xcode project for manual signing
        run: |
          set -euo pipefail
          PBXPROJ="${{ inputs.ios-project-dir }}/${{ inputs.ios-project-file }}/project.pbxproj"
          node - << 'EOF'
          const fs = require('fs');
          const pbxPath = process.env.PBXPROJ;
          const ppUuid = process.env.PP_UUID;
          const teamId = process.env.PP_TEAM;
          let content = fs.readFileSync(pbxPath, 'utf8');

          // Switch all CODE_SIGN_STYLE from Automatic to Manual
          content = content.replace(/CODE_SIGN_STYLE = Automatic;/g, 'CODE_SIGN_STYLE = Manual;');

          // In the App target Release buildSettings (identified by PRODUCT_BUNDLE_IDENTIFIER),
          // inject manual signing keys. PRODUCT_BUNDLE_IDENTIFIER only appears in the
          // App target Release config, not in project-level or Debug configs.
          content = content.replace(
            /([ \t]+PRODUCT_BUNDLE_IDENTIFIER = [^;]+;)/,
            `$1\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tDEVELOPMENT_TEAM = "${teamId}";\n\t\t\t\tPROVISIONING_PROFILE = "${ppUuid}";`
          );

          fs.writeFileSync(pbxPath, content);
          console.log('Patched project.pbxproj: Manual signing, PP_UUID=' + ppUuid + ', TEAM=' + teamId);
          EOF
        env:
          PBXPROJ: ${{ inputs.ios-project-dir }}/${{ inputs.ios-project-file }}/project.pbxproj

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo "ASC_API_KEY_PATH=$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8" >> $GITHUB_ENV

      - name: Build .xcarchive
        run: |
          set -euo pipefail
          xcodebuild \
            -project "${{ inputs.ios-project-dir }}/${{ inputs.ios-project-file }}" \
            -scheme "${{ inputs.ios-scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PP_UUID" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Diagnose archive signing
        run: |
          APP="$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app"
          echo "Bundle ID embebido:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP/Info.plist" || true
          echo "Profile embebido - Name:"
          security cms -D -i "$APP/embedded.mobileprovision" | plutil -extract Name raw - || true
          echo "Profile embebido - TeamIdentifier:"
          security cms -D -i "$APP/embedded.mobileprovision" | plutil -extract TeamIdentifier.0 raw - || true

      - name: Export IPA
        env:
          EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
        run: |
          set -euo pipefail
          EXPORT_OPTS_PATH=$RUNNER_TEMP/ExportOptions.plist
          echo -n "$EXPORT_OPTIONS_PLIST" | base64 --decode -o "$EXPORT_OPTS_PATH"

          echo "=== ExportOptions.plist ==="
          plutil -p "$EXPORT_OPTS_PATH" || true

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTS_PATH" \
            -exportPath $RUNNER_TEMP/build \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}"

          echo "== Exported files =="
          ls -la $RUNNER_TEMP/build

      - name: Upload to App Store Connect
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          set -euo pipefail

          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$KEY_DIR"
          API_KEY_FILE="$KEY_DIR/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$API_KEY_FILE"
          chmod 600 "$API_KEY_FILE"

          IPA_PATH=$(ls $RUNNER_TEMP/build/*.ipa | head -1)
          echo "Uploading IPA: $IPA_PATH"

          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

      - name: Submit build for App Store review
        if: inputs.submit-for-review == true
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
          BUNDLE_IDENTIFIER: ${{ inputs.bundle-identifier }}
          RELEASE_NOTES: ${{ inputs.release-notes }}
        run: |
          set -euo pipefail
          if [ -z "$BUNDLE_IDENTIFIER" ]; then
            echo "❌ submit-for-review is true but bundle-identifier was not provided."
            exit 1
          fi
          if [ -z "$RELEASE_NOTES" ]; then
            echo "❌ submit-for-review is true but release-notes was not provided."
            exit 1
          fi

          node - <<'EOF'
          const crypto = require('crypto');

          const keyId = process.env.APP_STORE_CONNECT_API_KEY_ID;
          const issuerId = process.env.APP_STORE_CONNECT_ISSUER_ID;
          const privateKey = Buffer.from(process.env.APP_STORE_CONNECT_API_KEY_BASE64, 'base64').toString('utf-8');
          const bundleId = process.env.BUNDLE_IDENTIFIER;
          const versionString = process.env.MARKETING_VERSION;
          const buildNumber = process.env.BUILD_NUMBER;
          const releaseNotes = process.env.RELEASE_NOTES;

          function base64url(input) {
            return Buffer.from(input).toString('base64').replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
          }

          function mintToken() {
            const header = { alg: 'ES256', kid: keyId, typ: 'JWT' };
            const now = Math.floor(Date.now() / 1000);
            const payload = { iss: issuerId, iat: now, exp: now + 1190, aud: 'appstoreconnect-v1' };
            const unsigned = `${base64url(JSON.stringify(header))}.${base64url(JSON.stringify(payload))}`;
            const signature = crypto.sign('sha256', Buffer.from(unsigned), { key: privateKey, dsaEncoding: 'ieee-p1363' });
            return `${unsigned}.${base64url(signature)}`;
          }

          async function api(method, path, body) {
            const res = await fetch(`https://api.appstoreconnect.apple.com${path}`, {
              method,
              headers: {
                Authorization: `Bearer ${mintToken()}`,
                'Content-Type': 'application/json',
              },
              body: body ? JSON.stringify(body) : undefined,
            });
            const text = await res.text();
            const json = text ? JSON.parse(text) : {};
            if (!res.ok) {
              throw new Error(`${method} ${path} -> ${res.status}: ${text.slice(0, 500)}`);
            }
            return json;
          }

          async function main() {
            console.log(`Looking up app by bundle id ${bundleId}...`);
            const appsRes = await api('GET', `/v1/apps?filter[bundleId]=${encodeURIComponent(bundleId)}`);
            const app = appsRes.data && appsRes.data[0];
            if (!app) throw new Error(`No app found in App Store Connect for bundle id ${bundleId}`);
            const appId = app.id;
            console.log(`App id: ${appId}`);

            console.log(`Waiting for build ${buildNumber} (version ${versionString}) to finish processing...`);
            const deadline = Date.now() + 45 * 60 * 1000;
            let build = null;
            while (Date.now() < deadline) {
              const buildsRes = await api(
                'GET',
                `/v1/builds?filter[app]=${appId}&filter[version]=${encodeURIComponent(buildNumber)}&filter[preReleaseVersion.version]=${encodeURIComponent(versionString)}&fields[builds]=processingState,version`,
              );
              const candidate = buildsRes.data && buildsRes.data[0];
              if (candidate) {
                console.log(`Build ${candidate.id} processingState=${candidate.attributes.processingState}`);
                if (candidate.attributes.processingState === 'VALID') {
                  build = candidate;
                  break;
                }
                if (candidate.attributes.processingState === 'INVALID' || candidate.attributes.processingState === 'FAILED') {
                  throw new Error(`Build processing failed with state ${candidate.attributes.processingState}`);
                }
              } else {
                console.log('Build not visible in App Store Connect yet...');
              }
              await new Promise((r) => setTimeout(r, 30000));
            }
            if (!build) throw new Error('Timed out waiting for build to finish processing in App Store Connect.');

            console.log('Looking for an editable App Store version...');
            const versionsRes = await api(
              'GET',
              `/v1/apps/${appId}/appStoreVersions?filter[platform]=IOS&filter[versionString]=${encodeURIComponent(versionString)}`,
            );
            let version = versionsRes.data && versionsRes.data[0];
            if (!version) {
              console.log(`No existing App Store version ${versionString} — creating one.`);
              const created = await api('POST', '/v1/appStoreVersions', {
                data: {
                  type: 'appStoreVersions',
                  attributes: { platform: 'IOS', versionString },
                  relationships: { app: { data: { type: 'apps', id: appId } } },
                },
              });
              version = created.data;
            } else {
              const state = version.attributes.appStoreState;
              const editableStates = ['PREPARE_FOR_SUBMISSION', 'DEVELOPER_REJECTED', 'REJECTED', 'METADATA_REJECTED', 'INVALID_BINARY'];
              if (!editableStates.includes(state)) {
                throw new Error(`App Store version ${versionString} is in state ${state}, which is not editable. Resolve it manually in App Store Connect.`);
              }
            }
            console.log(`Using App Store version ${version.id}`);

            console.log('Attaching build to version...');
            await api('PATCH', `/v1/appStoreVersions/${version.id}`, {
              data: {
                type: 'appStoreVersions',
                id: version.id,
                relationships: { build: { data: { type: 'builds', id: build.id } } },
              },
            });

            console.log('Updating release notes (en-US)...');
            const locRes = await api('GET', `/v1/appStoreVersions/${version.id}/appStoreVersionLocalizations`);
            const loc = (locRes.data && locRes.data.find((l) => l.attributes.locale === 'en-US')) || (locRes.data && locRes.data[0]);
            if (loc) {
              await api('PATCH', `/v1/appStoreVersionLocalizations/${loc.id}`, {
                data: { type: 'appStoreVersionLocalizations', id: loc.id, attributes: { whatsNew: releaseNotes } },
              });
            } else {
              console.log('No localization found to attach release notes to — skipping (set one up in App Store Connect first).');
            }

            console.log('Submitting version for App Store review...');
            await api('POST', '/v1/appStoreVersionSubmissions', {
              data: {
                type: 'appStoreVersionSubmissions',
                relationships: { appStoreVersion: { data: { type: 'appStoreVersions', id: version.id } } },
              },
            });

            console.log(`✅ Submitted App Store version ${versionString} (build ${build.id}) for review.`);
          }

          main().catch((err) => {
            console.error('❌ ' + err.message);
            process.exit(1);
          });
          EOF

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-${{ github.run_number }}
          path: ${{ runner.temp }}/build/*.ipa
          retention-days: 7

      - name: Clean up keychain and provisioning profiles
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision || true
