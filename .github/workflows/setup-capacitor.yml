name: Setup Capacitor (Centralized)

on:
  workflow_dispatch:
    inputs:
      github_owner:
        description: "GitHub repository owner"
        required: true
        type: string
      github_repo:
        description: "GitHub repository name"
        required: true
        type: string
      branch:
        description: "Branch to work on"
        required: true
        type: string
      bundle_id:
        description: "App bundle ID (e.g., com.example.myapp)"
        required: true
        type: string
      app_name:
        description: "App display name"
        required: true
        type: string
      pat:
        description: "GitHub PAT with write access to the target repository"
        required: true
        type: string

jobs:
  setup:
    name: Setup Capacitor
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.github_owner != '' && inputs.github_repo != '' && inputs.bundle_id != '' }}

    steps:
      - name: Checkout bgp-admin (for shared scripts)
        uses: actions/checkout@v4
        with:
          path: bgp-admin

      - name: Clone target app repository
        run: |
          git clone --depth 1 --branch ${{ inputs.branch }} \
            https://x-access-token:${{ inputs.pat }}@github.com/${{ inputs.github_owner }}/${{ inputs.github_repo }}.git \
            app-repo
          cd app-repo
          git config user.name "BGP Admin Bot"
          git config user.email "admin@biblegames.dev"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install existing dependencies
        run: |
          cd app-repo
          bun install --frozen-lockfile || bun install

      - name: Add Capacitor packages
        run: |
          cd app-repo
          bun add @capacitor/core @capacitor/cli @capacitor/ios @capacitor/android

      - name: Detect app type and set webDir
        run: |
          cd app-repo
          # TanStack Start apps (@lovable.dev/vite-tanstack-config) output static assets
          # to dist/client/ instead of dist/. Detect and use the correct webDir.
          if node -e "const p=require('./package.json'); process.exit(p.dependencies?.['@tanstack/react-start'] || p.devDependencies?.['@tanstack/react-start'] ? 0 : 1)" 2>/dev/null; then
            echo "WEB_DIR=dist/client" >> $GITHUB_ENV
            echo "Detected TanStack Start app → webDir: dist/client"
          else
            echo "WEB_DIR=dist" >> $GITHUB_ENV
            echo "Detected standard Vite app → webDir: dist"
          fi

      - name: Create capacitor.config.ts
        env:
          BUNDLE_ID: ${{ inputs.bundle_id }}
          APP_NAME: ${{ inputs.app_name }}
        run: |
          cd app-repo
          node - << 'EOF'
          const fs = require('fs');
          const bundleId = process.env.BUNDLE_ID;
          const appName = process.env.APP_NAME;
          const webDir = process.env.WEB_DIR || 'dist';
          const lines = [
            "import type { CapacitorConfig } from '@capacitor/cli';",
            "",
            "const config: CapacitorConfig = {",
            `  appId: ${JSON.stringify(bundleId)},`,
            `  appName: ${JSON.stringify(appName)},`,
            `  webDir: ${JSON.stringify(webDir)},`,
            "};",
            "",
            "export default config;",
            "",
          ];
          fs.writeFileSync('capacitor.config.ts', lines.join('\n'));
          console.log('Written capacitor.config.ts:');
          console.log(lines.join('\n'));
          EOF

      - name: Enable SPA mode for TanStack Start apps
        run: |
          cd app-repo
          if [ "$WEB_DIR" != "dist/client" ]; then
            echo "Not a TanStack Start app — skipping SPA mode patch"
            exit 0
          fi
          node -e "
            const fs = require('fs');
            if (!fs.existsSync('vite.config.ts')) {
              console.log('No vite.config.ts found — skipping SPA mode patch');
              process.exit(0);
            }
            let content = fs.readFileSync('vite.config.ts', 'utf8');
            if (content.includes('spa:') && content.includes('enabled: true')) {
              console.log('SPA mode already configured — skipping');
              process.exit(0);
            }
            const spaOption = 'spa: { enabled: true, prerender: { outputPath: \"index.html\" } }';
            // Case 1: tanstackStart() with no args
            let patched = content.replace(
              /tanstackStart\s*\(\s*\)/,
              'tanstackStart({ ' + spaOption + ' })'
            );
            // Case 2: tanstackStart({ with existing args
            if (patched === content) {
              patched = content.replace(
                /tanstackStart\s*\(\s*\{/,
                'tanstackStart({ ' + spaOption + ','
              );
            }
            if (patched === content) {
              console.log('Could not find tanstackStart() in vite.config.ts — skipping');
              process.exit(0);
            }
            fs.writeFileSync('vite.config.ts', patched);
            console.log('Patched vite.config.ts: enabled TanStack Start SPA mode for Capacitor');
          "

      - name: Add postbuild script for TanStack Start apps
        run: |
          cd app-repo
          if [ "$WEB_DIR" != "dist/client" ]; then
            echo "Not a TanStack Start app — skipping postbuild script"
            exit 0
          fi
          mkdir -p scripts
          cp ../bgp-admin/scripts/generate-capacitor-html.js scripts/generate-capacitor-html.js
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            if (!pkg.scripts) pkg.scripts = {};
            const pb = 'node scripts/generate-capacitor-html.js';
            if (!pkg.scripts.postbuild) {
              pkg.scripts.postbuild = pb;
            } else if (!pkg.scripts.postbuild.includes('generate-capacitor-html')) {
              pkg.scripts.postbuild += ' && ' + pb;
            }
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Added postbuild script to package.json');
          "

      - name: Create stub web assets for cap sync
        run: |
          cd app-repo
          mkdir -p "$WEB_DIR"
          echo '<!DOCTYPE html><html><body></body></html>' > "$WEB_DIR/index.html"
          echo "Created stub at $WEB_DIR/index.html"

      - name: Add iOS native project
        run: |
          cd app-repo
          if [ -d "ios" ]; then
            echo "ios/ already exists, skipping"
          else
            bunx cap add ios
            echo "Created ios/ native project"
          fi

      - name: Add Android native project
        run: |
          cd app-repo
          if [ -d "android" ]; then
            echo "android/ already exists, skipping"
          else
            bunx cap add android
            echo "Created android/ native project"
          fi

      - name: Commit and push changes
        run: |
          cd app-repo
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit — Capacitor was already configured"
          else
            git commit -m "chore: set up Capacitor via bgp-admin"
            git push https://x-access-token:${{ inputs.pat }}@github.com/${{ inputs.github_owner }}/${{ inputs.github_repo }}.git ${{ inputs.branch }}
            echo "Capacitor setup committed and pushed successfully"
          fi
